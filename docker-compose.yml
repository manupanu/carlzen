services:
  carlzen:
    build: .
    ports:
      - "${HOST_PORT:-8080}:${PORT:-3000}"
    volumes:
      - ./data:/app/data
    restart: ${RESTART_POLICY:-always}
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SYNC_DB_PATH=${SYNC_DB_PATH:-/app/data/carlzen-sync.db}
